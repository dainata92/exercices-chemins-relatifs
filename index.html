<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercices chemins relatifs</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <h1>Exercices chemins relatifs</h1>

    <form action="" method="get" class="form-example" id="form">
        <button type="button" id="nouvelExercice">Nouvel Exercice</button>
        <div class="haut">
            <div class="form-example">
                <label for="adresseActuelle">Entrez le chemin actuel </label>
                <input type="text" name="adresseActuelle" id="adresseActuelle" required />
            </div>
            <div class="form-example">
                <label for="lien">Entrez votre lien</label>
                <input type="text" name="lien" id="lien" required />
            </div>
        </div>
        <div class="bas">
            <label for="adresseDestination">Entrez le chemin de destination</label>
            <input type="text" name="adresseDestination" id="adresseDestination" required />
        </div>
        <div class="form-example">
            <input type="submit" value="Verifier !" />
        </div>
    </form>
    <p id="resultat"></p>
    <ul id="explication">
        <li>Le chemin actuel est composé d'un dossier /test suivi par un fichier lol</li>
        <li>Le lien est composé d'un fichier re-test</li>
        <li>Le fichier re-test supprime le fichier lol et le fichier re-test sera placé dans le dossier /test</li>
    </ul>
    <script src="script.js"></script>
</body>
</html>
